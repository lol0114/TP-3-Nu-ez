<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Sistema de Atención</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Sistema de Atención</h2>

<button id="pausar">Pausar Entrada</button>

<div class="contenedor">


    <div class="lado-izq">

        <div class="panel" id="panelEntrada">

            <input type="text" id="nombre" placeholder="Ingrese nombre">

            <button id="anotar">Anotar</button>

            <button id="atender">
                Atender Siguiente
            </button>

            <button id="reiniciar">
                Reiniciar Día
            </button>

        </div>

    </div>


    <div class="lado-der">

        <div class="pantalla">
            Atendiendo a:
            <span id="actual">Nadie</span>
        </div>

        <div class="lista">

            <h3>Lista de espera</h3>

            <ul id="listaClientes"></ul>

        </div>

        <div class="contador">
            Personas en espera:
            <span id="contador">0</span>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
